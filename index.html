<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>London Café</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: url("https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb") center/cover;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-shadow: 0 0 10px rgba(0,0,0,0.6);
    }

    header h1 {
      font-size: 40px;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .buttons a {
      display: block;
      margin: 10px auto;
      padding: 15px;
      width: 80%;
      max-width: 300px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
      transition: 0.3s;
    }

    .buttons a:hover {
      background: #333;
    }

    .menu {
      margin-top: 40px;
      text-align: left;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .menu h2 {
      border-bottom: 2px solid #ccc;
      padding-bottom: 5px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

  </style>
</head>

<body>

<header>
  <h1>London Café ☕</h1>
</header>

<div class="container">

  <p>Cafetería apta para mascotas</p>

  <div class="buttons">
    <a href="#menu">📖 Ver menú</a>

    <a href="https://wa.me/549XXXXXXXXXX" target="_blank">
      📱 WhatsApp
    </a>

    <a href="https://instagram.com/" target="_blank">
      📸 Instagram
    </a>

    <a href="https://maps.google.com" target="_blank">
      📍 Cómo llegar
    </a>
  </div>

  <div class="menu" id="menu">
    <h2>☕ Cafetería</h2>

    <div class="item">
      <span>Espresso</span>
      <span>$3400</span>
    </div>

    <div class="item">
      <span>Latte</span>
      <span>$4700</span>
    </div>

    <div class="item">
      <span>Capuccino</span>
      <span>$4700</span>
    </div>

    <h2>🍰 Tortas</h2>

    <div class="item">
      <span>Cheesecake</span>
      <span>$6500</span>
    </div>

    <div class="item">
      <span>Lemon Pie</span>
      <span>$6200</span>
    </div>

  </div>

</div>

</body>
</html>
